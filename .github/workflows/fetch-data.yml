name: Fetch Market Data

on:
  schedule:
    - cron: '*/5 9-21 * * 1-5'
    - cron: '0 * * * 0,6'
  workflow_dispatch: {}

concurrency:
  group: fetch-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Clone ticker-tape
        run: git clone --depth 1 https://github.com/jeffbai996/ticker-tape.git /tmp/ticker-tape
      - name: Install dependencies
        run: pip install -q -r scripts/requirements.txt -r /tmp/ticker-tape/requirements.txt
      - name: Fetch market data
        run: python scripts/fetch_data.py
        env:
          TICKER_TAPE_DIR: /tmp/ticker-tape
          WATCHLIST_SYMBOLS: ${{ secrets.WATCHLIST_SYMBOLS }}
          THESIS_BUCKETS: ${{ secrets.THESIS_BUCKETS }}
      - name: Fetch fundamentals
        run: python scripts/fetch_lookup.py
        env:
          TICKER_TAPE_DIR: /tmp/ticker-tape
          WATCHLIST_SYMBOLS: ${{ secrets.WATCHLIST_SYMBOLS }}
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "data: update market snapshot"
          git push
